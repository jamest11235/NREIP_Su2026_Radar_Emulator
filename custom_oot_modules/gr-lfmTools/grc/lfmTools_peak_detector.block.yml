id: lfmTools_peak_detector
label: peak_detector
category: '[LFM Tools]'

templates:
  imports: from gnuradio import lfmTools
  make: lfmTools.peak_detector(${threshold_factor_rise}, ${look_ahead}, ${calibration_window}, ${calibration_interval})

#  Make one 'parameters' list entry for every parameter you want settable from the GUI.
#     Keys include:
#     * id (makes the value accessible as keyname, e.g. in the make entry)
#     * label (label shown in the GUI)
#     * dtype (e.g. int, float, complex, byte, short, xxx_vector, ...)
#     * default
parameters:
- id: threshold_factor_rise
  label: Threshold Factor Rise
  dtype: float
  default: 0.9
- id: look_ahead
  label: Look Ahead
  dtype: int
  default: 100
- id: calibration_window
  label: Calibration Window
  dtype: int
  default: 1000
- id: calibration_interval
  label: Calibration Interval
  dtype: int
  default: 10000
#- id: ...
#  label: ...
#  dtype: ...

#  Make one 'inputs' list entry per input and one 'outputs' list entry per output.
#  Keys include:
#      * label (an identifier for the GUI)
#      * domain (optional - stream or message. Default is stream)
#      * dtype (e.g. int, float, complex, byte, short, xxx_vector, ...)
#      * vlen (optional - data stream vector length. Default is 1)
#      * optional (optional - set to 1 for optional inputs. Default is 0)
inputs:
- label: in0
  domain: stream
  dtype: float
#- label: ...
#  domain: ...
#  dtype: ...
#  vlen: ...
#  optional: ...

outputs:
- label: out0
  domain: stream
  dtype: byte

#  'file_format' specifies the version of the GRC yml format used in the file
#  and should usually not be changed.
file_format: 1
